<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Record Management System</title>
    <link rel="stylesheet" href="/static/student.css">
</head>
<body>
    <div class="container">
        <h1>🎓 Student Record Management System</h1>
        
        <div class="form-container">
            <h2>Add / Update Student</h2>
            <form id="studentForm">
                <input type="hidden" id="studentIndex">
                <div class="form-group">
                    <label for="studentId">Student ID:</label>
                    <input type="text" id="studentId" required placeholder="e.g. STU101">
                </div>
                <div class="form-group">
                    <label for="studentName">Full Name:</label>
                    <input type="text" id="studentName" required placeholder="e.g. John Doe">
                </div>
                <div class="form-group">
                    <label for="studentEmail">Email:</label>
                    <input type="email" id="studentEmail" required placeholder="e.g. john@example.com">
                </div>
                <div class="form-group">
                    <label for="studentGrade">Grade/GPA:</label>
                    <input type="number" id="studentGrade" step="0.01" min="0" max="10" required placeholder="e.g. 8.5">
                </div>
                <button type="submit" id="submitBtn">Save Record</button>
                <button type="button" id="cancelBtn" class="hidden">Cancel Edit</button>
            </form>
        </div>

        <div class="controls">
            <input type="text" id="searchBar" placeholder="🔍 Search by Name or ID...">
            <select id="sortSelect">
                <option value="none">Sort By...</option>
                <option value="name">Name (A-Z)</option>
                <option value="grade">Grade (Highest First)</option>
            </select>
        </div>

        <div class="table-container">
            <h2>Student Records</h2>
            <table id="studentTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Grade</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    </tbody>
            </table>
        </div>
    </div>
    <script src="/static/student.js"></script>
</body>
</html>
